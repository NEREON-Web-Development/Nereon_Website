# ──────────────────────────────────────────────────────────────────────────────
# NEREON Website — Automatic Deploy Pipeline
# Triggers on every push to the `main` branch.
#
# CHOOSE YOUR DEPLOYMENT TARGET:
#   Option A → FTP / Plesk / cPanel Shared Hosting  (activate the FTP job below)
#   Option B → GitHub Pages                          (activate the Pages job below)
#   Option C → Netlify                               (activate the Netlify job below)
#
# REQUIRED GITHUB SECRETS  (Settings → Secrets → Actions → New repository secret)
#
#   For Option A — FTP (Plesk / cPanel / any shared hosting):
#     FTP_HOST       → Your server hostname, e.g. ftp.yourdomain.com
#                      (Plesk: find it in Plesk → Websites & Domains → FTP Access)
#     FTP_USERNAME   → Your FTP username
#                      (Plesk: the username shown under FTP Access, or your Plesk system user)
#     FTP_PASSWORD   → Your FTP password
#                      (Plesk: the password you set when activating hosting — no need to create
#                       a new FTP account, the default one works fine)
#     FTP_SERVER_DIR → Remote directory to deploy to
#                      • Plesk  → /httpdocs          (or /httpdocs/subdirectory)
#                      • cPanel → /public_html       (or /public_html/subdirectory)
#
#   For Option B (GitHub Pages):
#     No secrets needed — just enable Pages in repo Settings → Pages
#     → Source: "GitHub Actions"
#
#   For Option C (Netlify):
#     NETLIFY_AUTH_TOKEN → Personal access token from app.netlify.com/user/applications
#     NETLIFY_SITE_ID    → Site ID from Netlify dashboard → Site settings → General
# ──────────────────────────────────────────────────────────────────────────────

name: Build & Deploy NEREON Website

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  # ── STEP 1: Build the React app ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── OPTION A: Deploy via FTP to Plesk / cPanel / Shared Hosting ────────────
  deploy-ftp:
    name: Deploy via FTP
    needs: build
    runs-on: ubuntu-latest
    # ↓ UNCOMMENT the line below to activate FTP deployment
    # if: github.ref == 'refs/heads/main'
    if: false # ← remove this line when activating
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Plesk default → /httpdocs   |   cPanel default → /public_html
          # Deletes remote files not in local build (keeps server clean)
          dangerous-clean-slate: false
          # Exclude system files
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

  # ── OPTION B: Deploy to GitHub Pages (free) ──────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # ↓ UNCOMMENT the line below to activate GitHub Pages deployment
    # if: github.ref == 'refs/heads/main'
    if: false # ← remove this line when activating
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── OPTION C: Deploy to Netlify ───────────────────────────────────────────────
  deploy-netlify:
    name: Deploy to Netlify
    needs: build
    runs-on: ubuntu-latest
    # ↓ UNCOMMENT the line below to activate Netlify deployment
    # if: github.ref == 'refs/heads/main'
    if: false # ← remove this line when activating
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: dist/
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
